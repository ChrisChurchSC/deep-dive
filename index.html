<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--app-head-->
    <!-- Fallback title/meta — overridden per-page by react-helmet-async -->
    <title>Deep Dive Films — Branded Edutainment Video Production</title>
    <meta name="description" content="Brooklyn-based branded edutainment studio. Documentary films that educate your audience and build your brand." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#080808" />

    <!-- Open Graph fallback -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Deep Dive Films" />
    <meta property="og:title"       content="Deep Dive Films — Branded Edutainment Video Production" />
    <meta property="og:description" content="Brooklyn-based branded edutainment studio. Documentary films that educate your audience and build your brand." />
    <meta property="og:image"       content="https://deepdivefilms.com/og-default.jpg" />

    <!-- Twitter Card fallback -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@deepdivefilms" />

    <!-- GA4 — replace G-XXXXXXXXXX with your Measurement ID -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX', {
        page_path: window.location.pathname,
      });
    </script>

    <!-- Preload hero video -->
    <link rel="preload" href="/hero.mp4" as="video" type="video/mp4" />

    <!-- Fonts — preconnect then load -->
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/nqv6igj.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
