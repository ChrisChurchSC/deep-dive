<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- All SEO tags (page title, description, canonical, Open Graph, Twitter,
         JSON-LD) are owned by react-helmet-async and injected here at prerender
         time. Do NOT add fallback SEO tags below: they would duplicate the
         per-page helmet output and ship conflicting metadata into every page.
         NOTE: this requires react-helmet-async 2.x — v3.0.0 breaks SSR (helmet
         context comes back empty and the tags leak into the body). -->
    <!--app-head-->

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#080808" />

    <!-- GA4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-84068Q5SRX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-84068Q5SRX', {
        page_path: window.location.pathname,
      });
    </script>

    <!-- Hero video is fetched on demand by the <video> element -->

    <!-- Fonts — preconnect then load -->
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://use.typekit.net/nqv6igj.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
